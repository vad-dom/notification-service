services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./src:/var/www/html
    depends_on:
      app-init:
        condition: service_completed_successfully

  worker-critical:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php artisan queue:work --queue=notifications.critical --tries=3 --sleep=1
    volumes:
      - ./src:/var/www/html
    depends_on:
      app-init:
        condition: service_completed_successfully

  worker-default:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php artisan queue:work --queue=notifications.default --tries=3 --sleep=1
    volumes:
      - ./src:/var/www/html
    depends_on:
      app-init:
        condition: service_completed_successfully

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: notification_user
      POSTGRES_PASSWORD: notification_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: notification_user
      RABBITMQ_DEFAULT_PASS: notification_password
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"

  app-init:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: init.sh
    volumes:
      - ./src:/var/www/html
    depends_on:
      - postgres
      - redis
      - rabbitmq

volumes:
  postgres_data: